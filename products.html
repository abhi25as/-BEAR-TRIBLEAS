<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bear Tribleas Products</title>
    <link rel="stylesheet" href="style.css"/>
    <style>
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; text-align: center; }
        .card img { max-width: 100%; height: auto; border-radius: 4px; }
        .badge { background: #ff4757; color: white; padding: 2px 8px; font-size: 12px; border-radius: 4px; }
        .price { font-weight: bold; color: #2ed573; }
        .mrp { text-decoration: line-through; color: #7f8c8d; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="product-grid">
        <div class="card">
            <span class="badge">BESTSELLER</span>
            <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=400&q=80" alt="Tribal Oversized Cotton Graphic T-Shirt">
            <h3>Tribal Oversized Cotton Graphic T-Shirt</h3>
            <p>
                <span class="price">₹1299</span>
                <span class="mrp">₹2499</span>
            </p>
        </div>

        <div class="card">
            <span class="badge">NEW</span>
            <img src="https://images.unsplash.com/photo-1556821840-3a63f95609a7?auto=format&fit=crop&w=400&q=80" alt="Heavyweight Grizzly Winter Hoodie">
            <h3>Heavyweight Grizzly Winter Hoodie</h3>
            <p>
                <span class="price">₹2799</span>
                <span class="mrp">₹4999</span>
            </p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1542272604-787c3835535d?auto=format&fit=crop&w=400&q=80" alt="Wilderness Multi-Pocket Cargo Pants">
            <h3>Wilderness Multi-Pocket Cargo Pants</h3>
            <p>
                <span class="price">₹2199</span>
                <span class="mrp">₹3599</span>
            </p>
        </div>

        <div class="card">
            <span class="badge">SALE</span>
            <img src="https://images.unsplash.com/photo-1576871337622-98d48d1cf531?auto=format&fit=crop&w=400&q=80" alt="Urban Bear Knitted Winter Beanie Cap">
            <h3>Urban Bear Knitted Winter Beanie Cap</h3>
            <p>
                <span class="price">₹699</span>
                <span class="mrp">₹999</span>
            </p>
        </div>
    </div>

</body>
</html>
